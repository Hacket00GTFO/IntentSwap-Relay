services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-intent_relay}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Contracts deploy (init container, runs once) ────────────────────────────
  contracts-deploy:
    build:
      context: ./contracts
      dockerfile: Dockerfile
    restart: "no"
    environment:
      DEPLOYER_PRIVATE_KEY: ${DEPLOYER_PRIVATE_KEY:?DEPLOYER_PRIVATE_KEY is required}
      DEPLOYER_ADDRESS: ${DEPLOYER_ADDRESS:?DEPLOYER_ADDRESS is required}
      MONAD_RPC_URL: ${MONAD_RPC_URL:-https://testnet-rpc.monad.xyz}
      PROTOCOL_FEE_BPS: ${PROTOCOL_FEE_BPS:-10}
      INTENT_DOMAIN_NAME: ${INTENT_DOMAIN_NAME:-IntentSwap Relay}
      INTENT_DOMAIN_VERSION: ${INTENT_DOMAIN_VERSION:-1}
      SHARED_DIR: /shared
    volumes:
      - shared-data:/shared

  # ── Backend (Rust / Axum) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      contracts-deploy:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-intent_relay_backend=info,tower_http=info}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-intent_relay}
      INTENT_DOMAIN_NAME: ${INTENT_DOMAIN_NAME:-IntentSwap Relay}
      INTENT_DOMAIN_VERSION: ${INTENT_DOMAIN_VERSION:-1}
      INTENT_CHAIN_ID: ${INTENT_CHAIN_ID:-10143}
      # INTENT_VERIFYING_CONTRACT is injected at runtime by docker-entrypoint.sh from /shared
      RELAY_ALLOWED_RELAYERS: ${RELAY_ALLOWED_RELAYERS:-0x13100671B2D2F59e3C7a6741560AC1c16510FaD5:Deployer}
      SHARED_DIR: /shared
    volumes:
      - shared-data:/shared

  # ── Frontend (React → Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_RELAY_API_BASE: ${VITE_RELAY_API_BASE:-http://localhost:8080}
        VITE_MONAD_RPC_URL: ${MONAD_RPC_URL:-https://testnet-rpc.monad.xyz}
        VITE_INTENT_DOMAIN_NAME: ${INTENT_DOMAIN_NAME:-IntentSwap Relay}
        VITE_INTENT_DOMAIN_VERSION: ${INTENT_DOMAIN_VERSION:-1}
        VITE_INTENT_CHAIN_ID: ${INTENT_CHAIN_ID:-10143}
    restart: unless-stopped
    depends_on:
      contracts-deploy:
        condition: service_completed_successfully
    ports:
      - "3000:80"
    environment:
      SHARED_DIR: /shared
    volumes:
      - shared-data:/shared

volumes:
  postgres-data:
  shared-data:
